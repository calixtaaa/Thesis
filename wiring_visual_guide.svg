<?xml version="1.0" encoding="UTF-8"?>
<svg width="1600" height="1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .component { fill: #f0f0f0; stroke: #333; stroke-width: 2; }
      .component-title { font-size: 14px; font-weight: bold; fill: #000; }
      .pin-label { font-size: 10px; fill: #333; }
      .wire-power { stroke: #dc2626; stroke-width: 2; }
      .wire-rfid { stroke: #0369a1; stroke-width: 2; }
      .wire-motor { stroke: #059669; stroke-width: 2; }
      .wire-lock { stroke: #b45309; stroke-width: 2; }
      .wire-sensor { stroke: #7c3aed; stroke-width: 2; }
      .group-label { font-size: 12px; font-weight: bold; fill: #666; }
    </style>
  </defs>
  
  <!-- Title -->
  <text x="800" y="30" text-anchor="middle" font-size="24" font-weight="bold">Vending Machine Wiring Diagram</text>
  
  <!-- Legend -->
  <g id="legend" transform="translate(20, 50)">
    <text x="0" y="0" class="group-label">Wire Categories:</text>
    <line x1="0" y1="15" x2="20" y2="15" class="wire-power"/>
    <text x="30" y="19" font-size="11">Power</text>
    
    <line x1="100" y1="15" x2="120" y2="15" class="wire-rfid"/>
    <text x="130" y="19" font-size="11">RFID/SPI</text>
    
    <line x1="250" y1="15" x2="270" y2="15" class="wire-motor"/>
    <text x="280" y="19" font-size="11">Motor/I2C</text>
    
    <line x1="420" y1="15" x2="440" y2="15" class="wire-lock"/>
    <text x="450" y="19" font-size="11">Relay/Lock</text>
    
    <line x1="580" y1="15" x2="600" y2="15" class="wire-sensor"/>
    <text x="610" y="19" font-size="11">Sensors</text>
  </g>
  
  <!-- Main Components Section -->
  
  <!-- Raspberry Pi 5 (center-left) -->
  <g id="pi5">
    <rect x="400" y="300" width="180" height="140" class="component"/>
    <text x="490" y="320" text-anchor="middle" class="component-title">Raspberry Pi 5</text>
    <text x="410" y="340" class="pin-label">GPIO2 (SDA)</text>
    <text x="410" y="355" class="pin-label">GPIO3 (SCL)</text>
    <text x="410" y="370" class="pin-label">GPIO5 (RFID RST)</text>
    <text x="410" y="385" class="pin-label">GPIO8-11 (SPI)</text>
    <text x="410" y="400" class="pin-label">GPIO16,20 (Relay)</text>
    <text x="410" y="415" class="pin-label">GPIO19,26 (Input)</text>
  </g>
  
  <!-- MFRC522 RFID (top-right) -->
  <g id="rfid">
    <rect x="1050" y="100" width="160" height="120" class="component"/>
    <text x="1130" y="125" text-anchor="middle" class="component-title">MFRC522 RFID</text>
    <text x="1060" y="145" class="pin-label">SPI: SCK, MOSI, MISO</text>
    <text x="1060" y="160" class="pin-label">CE0 (GPIO8)</text>
    <text x="1060" y="175" class="pin-label">RST (GPIO5)</text>
    <text x="1060" y="190" class="pin-label">3.3V, GND</text>
  </g>
  
  <!-- MCP23017 Trio (left side) -->
  <g id="mcps">
    <!-- MCP20 -->
    <rect x="50" y="120" width="140" height="110" class="component"/>
    <text x="120" y="140" text-anchor="middle" class="component-title">MCP23017 #1</text>
    <text x="60" y="160" class="pin-label">Addr: 0x20</text>
    <text x="60" y="175" class="pin-label">Slots 1-4</text>
    <text x="60" y="190" class="pin-label">I2C: GPIO2/3</text>
    <text x="60" y="205" class="pin-label">3.3V, GND</text>
    
    <!-- MCP21 -->
    <rect x="50" y="260" width="140" height="110" class="component"/>
    <text x="120" y="280" text-anchor="middle" class="component-title">MCP23017 #2</text>
    <text x="60" y="300" class="pin-label">Addr: 0x21</text>
    <text x="60" y="315" class="pin-label">Slots 5-8</text>
    <text x="60" y="330" class="pin-label">I2C: GPIO2/3</text>
    <text x="60" y="345" class="pin-label">3.3V, GND</text>
    
    <!-- MCP22 -->
    <rect x="50" y="400" width="140" height="110" class="component"/>
    <text x="120" y="420" text-anchor="middle" class="component-title">MCP23017 #3</text>
    <text x="60" y="440" class="pin-label">Addr: 0x22</text>
    <text x="60" y="455" class="pin-label">Slots 9-10</text>
    <text x="60" y="470" class="pin-label">I2C: GPIO2/3</text>
    <text x="60" y="485" class="pin-label">3.3V, GND</text>
  </g>
  
  <!-- Relay Module (right) -->
  <g id="relay">
    <rect x="1050" y="300" width="160" height="110" class="component"/>
    <text x="1130" y="325" text-anchor="middle" class="component-title">Relay Module</text>
    <text x="1060" y="345" class="pin-label">IN1: GPIO16</text>
    <text x="1060" y="360" class="pin-label">IN2: GPIO20</text>
    <text x="1060" y="375" class="pin-label">CH1: Restock</text>
    <text x="1060" y="390" class="pin-label">CH2: Troubleshoot</text>
  </g>
  
  <!-- Solenoid Locks (far right) -->
  <g id="solenoids">
    <!-- Restock -->
    <rect x="1300" y="280" width="140" height="90" class="component"/>
    <text x="1370" y="305" text-anchor="middle" class="component-title">Solenoid</text>
    <text x="1310" y="325" class="pin-label">Restock Door</text>
    <text x="1310" y="340" class="pin-label">12V Power</text>
    <text x="1310" y="355" class="pin-label">from Relay CH1</text>
    
    <!-- Troubleshoot -->
    <rect x="1300" y="410" width="140" height="90" class="component"/>
    <text x="1370" y="435" text-anchor="middle" class="component-title">Solenoid</text>
    <text x="1310" y="455" class="pin-label">Troubleshoot Door</text>
    <text x="1310" y="470" class="pin-label">12V Power</text>
    <text x="1310" y="485" class="pin-label">from Relay CH2</text>
  </g>
  
  <!-- Stepper Motors -->
  <g id="motors">
    <rect x="50" y="600" width="140" height="80" class="component"/>
    <text x="120" y="625" text-anchor="middle" class="component-title">Steppers</text>
    <text x="60" y="645" class="pin-label">10x 28BYJ-48</text>
    <text x="60" y="660" class="pin-label">via ULN2003</text>
    <text x="60" y="675" class="pin-label">12V Power</text>
  </g>
  
  <!-- Sensors (bottom) -->
  <g id="sensors">
    <!-- Coin Acceptor -->
    <rect x="450" y="600" width="140" height="80" class="component"/>
    <text x="520" y="625" text-anchor="middle" class="component-title">Coin Acceptor</text>
    <text x="460" y="645" class="pin-label">GPIO19 Pulse</text>
    <text x="460" y="660" class="pin-label">WEIYU 1239</text>
    <text x="460" y="675" class="pin-label">12V Input</text>
    
    <!-- IR Sensor -->
    <rect x="700" y="600" width="140" height="80" class="component"/>
    <text x="770" y="625" text-anchor="middle" class="component-title">IR Break-Beam</text>
    <text x="710" y="645" class="pin-label">GPIO26 Signal</text>
    <text x="710" y="660" class="pin-label">5V Power</text>
    <text x="710" y="675" class="pin-label">Active-Low</text>
  </g>
  
  <!-- Power Supplies (bottom-left) -->
  <g id="power">
    <!-- 12V PSU -->
    <rect x="50" y="780" width="140" height="80" class="component"/>
    <text x="120" y="805" text-anchor="middle" class="component-title">12V PSU</text>
    <text x="60" y="825" class="pin-label">+12V Output</text>
    <text x="60" y="840" class="pin-label">GND (common)</text>
  </g>
  
  <!-- Power Rails (right side, compact) -->
  <g id="rails">
    <!-- 5V Rail -->
    <rect x="1000" y="600" width="100" height="60" class="component"/>
    <text x="1050" y="620" text-anchor="middle" class="component-title">5V Rail</text>
    <text x="1010" y="645" class="pin-label">from Pi</text>
    
    <!-- 3.3V Rail -->
    <rect x="1000" y="720" width="100" height="60" class="component"/>
    <text x="1050" y="740" text-anchor="middle" class="component-title">3.3V Rail</text>
    <text x="1010" y="765" class="pin-label">from Pi</text>
  </g>
  
  <!-- Connection Lines (simplified) -->
  
  <!-- I2C Lines (Motor/I2C - Green) -->
  <line x1="490" y1="370" x2="120" y2="300" class="wire-motor" stroke-dasharray="5,5"/>
  
  <!-- SPI Lines (RFID - Blue) -->
  <line x1="580" y1="340" x2="1050" y2="200" class="wire-rfid" stroke-dasharray="5,5"/>
  
  <!-- Power Lines (Red) -->
  <line x1="120" y1="780" x2="120" y2="680" class="wire-power" stroke-dasharray="5,5"/>
  <line x1="490" y1="440" x2="490" y2="600" class="wire-power" stroke-dasharray="5,5"/>
  
  <!-- Relay Lines (Orange) -->
  <line x1="580" y1="400" x2="1050" y2="380" class="wire-lock" stroke-dasharray="5,5"/>
  <line x1="1210" y1="350" x2="1300" y2="325" class="wire-lock" stroke-dasharray="5,5"/>
  
  <!-- Sensor Lines (Purple) -->
  <line x1="490" y1="440" x2="520" y2="600" class="wire-sensor" stroke-dasharray="5,5"/>
  <line x1="490" y1="440" x2="770" y2="600" class="wire-sensor" stroke-dasharray="5,5"/>
  
  <!-- Summary Info Box -->
  <g id="info">
    <rect x="1200" y="850" width="380" height="300" fill="#f5f5f5" stroke="#999" stroke-width="1"/>
    <text x="1220" y="875" font-size="13" font-weight="bold">Key Specifications:</text>
    
    <text x="1220" y="900" font-size="11">GPIO Allocation:</text>
    <text x="1230" y="915" font-size="10">• I2C: GPIO2(SDA), GPIO3(SCL)</text>
    <text x="1230" y="928" font-size="10">• SPI: GPIO8-11 (RFID)</text>
    <text x="1230" y="941" font-size="10">• Relay: GPIO16, GPIO20</text>
    <text x="1230" y="954" font-size="10">• Sensors: GPIO19, GPIO26</text>
    
    <text x="1220" y="975" font-size="11">Power Distribution:</text>
    <text x="1230" y="990" font-size="10">• 3.3V: RFID, MCPs, Logic</text>
    <text x="1230" y="1003" font-size="10">• 5V: Relay module, sensors</text>
    <text x="1230" y="1016" font-size="10">• 12V: Motors, solenoids</text>
    
    <text x="1220" y="1037" font-size="11">MCP Addresses (I2C):</text>
    <text x="1230" y="1052" font-size="10">• 0x20 (A0-A2=GND): Slots 1-4</text>
    <text x="1230" y="1065" font-size="10">• 0x21 (A0=VDD): Slots 5-8</text>
    <text x="1230" y="1078" font-size="10">• 0x22 (A1=VDD): Slots 9-10</text>
    
    <text x="1220" y="1099" font-size="11">Critical Safety:</text>
    <text x="1230" y="1114" font-size="10">• Flyback diodes on solenoids</text>
    <text x="1230" y="1127" font-size="10">• Common GND (Pi + 12V PSU)</text>
  </g>
  
  <!-- Connection Path Annotations -->
  <text x="800" y="850" font-size="12" font-weight="bold">Data Flow Paths:</text>
  <text x="800" y="870" font-size="10">• Vend: Pi → MCP → Motor steps → IR confirms product drop</text>
  <text x="800" y="890" font-size="10">• Payment: RFID → Pi detects card → GPIO16/20 → Relay → Solenoid unlocks door</text>
  <text x="800" y="910" font-size="10">• Coins: Acceptor pulse → GPIO19 → Pi counts currency → Available products update</text>
  
</svg>
