<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#6366f1">
    <title>Admin Login — Hygiene Vending</title>
    <link rel="icon" type="image/jpeg" href="/static/images/ThesisLogo.png">

    <!-- Performance: preconnect to CDN -->
    <link rel="preconnect" href="https://cdn.tailwindcss.com" crossorigin>
    <link rel="dns-prefetch" href="https://cdn.tailwindcss.com">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', '"SF Pro Display"', '"SF Pro Text"', '"Helvetica Neue"', 'Helvetica', 'Arial', 'sans-serif'],
                    },
                },
            },
        }
    </script>
    <style>
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .fade-up {
            animation: fadeUp .6s ease both
        }

        .fade-up-d1 {
            animation-delay: .12s
        }

        .fade-up-d2 {
            animation-delay: .24s
        }

        .gradient-bg {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a78bfa 100%)
        }
    </style>
</head>

<body class="font-sans min-h-screen gradient-bg flex items-center justify-center p-4">

    <div class="w-full max-w-md fade-up">
        <!-- Back to home -->
        <a href="{{ url_for('index') }}"
            class="inline-flex items-center gap-2 text-white/80 hover:text-white text-sm font-medium mb-5 sm:mb-6 transition-colors min-h-[44px]">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round">
                <path d="M19 12H5M12 19l-7-7 7-7" />
            </svg>
            Back to Home
        </a>

        <div
            class="bg-white rounded-[20px] sm:rounded-[24px] shadow-2xl shadow-black/15 px-6 sm:px-9 pt-10 sm:pt-12 pb-7 sm:pb-9">
            <!-- Lock icon -->
            <div class="text-center fade-up fade-up-d1">
                <div
                    class="inline-flex items-center justify-center w-16 h-16 sm:w-[72px] sm:h-[72px] rounded-2xl bg-gradient-to-br from-indigo-500 to-violet-600 text-white mb-5 sm:mb-6 shadow-lg shadow-indigo-500/30">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                        <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                    </svg>
                </div>

                <h1 class="text-2xl sm:text-[1.625rem] font-bold tracking-tight text-[#1c1c1e] mb-1">Admin Login</h1>
                <p class="text-xs sm:text-sm text-[#8e8e93] mb-6 sm:mb-7">Hygiene Vending Machine — Secure Access</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            <div class="mb-5 fade-up">
                {% for category, message in messages %}
                <div
                    class="bg-red-50 border border-red-200 text-red-600 text-sm font-medium rounded-xl px-4 py-2.5 flex items-center gap-2">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        class="flex-shrink-0">
                        <circle cx="12" cy="12" r="10" />
                        <line x1="15" y1="9" x2="9" y2="15" />
                        <line x1="9" y1="9" x2="15" y2="15" />
                    </svg>
                    <span>{{ message }}</span>
                </div>
                {% endfor %}
            </div>
            {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('login') }}"
                class="flex flex-col gap-3.5 sm:gap-4 text-left fade-up fade-up-d2" autocomplete="on">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div>
                    <label for="username"
                        class="block text-xs font-semibold text-[#8e8e93] uppercase tracking-wider mb-1.5">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter username"
                        autocomplete="username" required autofocus maxlength="100"
                        class="w-full px-4 py-3 text-[15px] bg-[#f2f2f7] border border-[#d1d1d6] rounded-xl text-[#1c1c1e] outline-none transition-all focus:border-indigo-500 focus:ring-[3px] focus:ring-indigo-500/10 placeholder:text-[#8e8e93] min-h-[48px]">
                </div>
                <div>
                    <label for="password"
                        class="block text-xs font-semibold text-[#8e8e93] uppercase tracking-wider mb-1.5">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter password"
                        autocomplete="current-password" required maxlength="200"
                        class="w-full px-4 py-3 text-[15px] bg-[#f2f2f7] border border-[#d1d1d6] rounded-xl text-[#1c1c1e] outline-none transition-all focus:border-indigo-500 focus:ring-[3px] focus:ring-indigo-500/10 placeholder:text-[#8e8e93] min-h-[48px]">
                </div>
                <button type="submit"
                    class="w-full mt-2 bg-gradient-to-r from-indigo-600 to-violet-600 text-white rounded-full py-3 text-[15px] font-semibold tracking-[-0.01em] hover:from-indigo-700 hover:to-violet-700 active:scale-[0.98] transition-all shadow-lg shadow-indigo-500/25 min-h-[48px]">
                    Sign In
                </button>
            </form>
        </div>

        <!-- Security badge -->
        <div
            class="mt-5 sm:mt-6 flex flex-wrap items-center justify-center gap-1.5 text-white/60 text-[11px] sm:text-xs text-center">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                class="flex-shrink-0">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
            </svg>
            <span>SHA-256 Encrypted &middot; CSRF Protected &middot; Rate Limited</span>
        </div>
    </div>

</body>

</html>
