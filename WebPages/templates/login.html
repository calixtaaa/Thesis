<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Hygiene Vending</title>
    <link rel="icon" type="image/jpeg" href="/static/images/vendingMachineIcon.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', '"SF Pro Display"', '"SF Pro Text"', '"Helvetica Neue"', 'Helvetica', 'Arial', 'sans-serif'],
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-[#f2f2f7] font-sans min-h-screen flex items-center justify-center">

    <div class="w-full max-w-md px-5 text-center">
        <div class="bg-white rounded-[20px] shadow-[0_4px_24px_rgba(0,0,0,0.08)] px-9 pt-12 pb-9">
            <!-- Lock icon -->
            <div class="inline-flex items-center justify-center w-[72px] h-[72px] rounded-full bg-black text-white mb-6">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
            </div>

            <h1 class="text-[1.625rem] font-bold tracking-tight text-[#1c1c1e] mb-1">Admin Login</h1>
            <p class="text-sm text-[#8e8e93] mb-7">Hygiene Vending Machine</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            <div class="mb-5">
                {% for category, message in messages %}
                <div class="bg-red-50 border border-red-200 text-red-600 text-sm font-medium rounded-xl px-4 py-2.5">{{ message }}</div>
                {% endfor %}
            </div>
            {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('login') }}" class="flex flex-col gap-4 text-left">
                <div>
                    <label for="username" class="block text-xs font-semibold text-[#8e8e93] uppercase tracking-wider mb-1.5">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter username" autocomplete="username" required autofocus
                           class="w-full px-4 py-3 text-[15px] bg-[#f2f2f7] border border-[#d1d1d6] rounded-xl text-[#1c1c1e] outline-none transition-all focus:border-black focus:ring-[3px] focus:ring-black/[.08] placeholder:text-[#8e8e93]">
                </div>
                <div>
                    <label for="password" class="block text-xs font-semibold text-[#8e8e93] uppercase tracking-wider mb-1.5">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter password" autocomplete="current-password" required
                           class="w-full px-4 py-3 text-[15px] bg-[#f2f2f7] border border-[#d1d1d6] rounded-xl text-[#1c1c1e] outline-none transition-all focus:border-black focus:ring-[3px] focus:ring-black/[.08] placeholder:text-[#8e8e93]">
                </div>
                <button type="submit"
                        class="w-full mt-2 bg-black text-white rounded-full py-3 text-[15px] font-medium tracking-[-0.01em] hover:bg-gray-800 active:scale-[0.98] transition-all">
                    Sign In
                </button>
            </form>
        </div>
        <p class="mt-6 text-xs text-[#8e8e93] tracking-wider">Secured Admin Access</p>
    </div>

</body>
</html>
