<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#6366f1">
    <title>Admin Dashboard — Hygiene Vending</title>
    <link rel="icon" type="image/jpeg" href="/static/images/ThesisLogo.png">

    <!-- Performance: preconnect to all CDNs (eliminates DNS+TCP+TLS latency) -->
    <link rel="preconnect" href="https://cdn.tailwindcss.com" crossorigin>
    <link rel="preconnect" href="https://unpkg.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="dns-prefetch" href="https://cdn.tailwindcss.com">
    <link rel="dns-prefetch" href="https://unpkg.com">
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: [
                            '-apple-system', 'BlinkMacSystemFont',
                            '"SF Pro Display"', '"SF Pro Text"',
                            '"Helvetica Neue"', 'Helvetica', 'Arial', 'sans-serif',
                        ],
                    },
                    colors: {
                        'ios-bg': '#f2f2f7',
                        'ios-surface': '#ffffff',
                        'ios-text': '#1c1c1e',
                        'ios-secondary': '#8e8e93',
                        'ios-separator': '#d1d1d6',
                    },
                },
            },
        }
    </script>

    <!-- Custom CSS (cache-bust) -->
    <link rel="stylesheet" href="/static/css/styles.css?v=7">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>

    <!-- React 18 -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel (JSX compilation) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body class="font-sans">

    <div id="root"></div>

    <!-- Pass Jinja2 variables to JS (plain script — no JSX here) -->
    <script>
        window.__USERNAME__ = "{{ username }}";
        window.__LOGOUT_URL__ = "{{ url_for('logout') }}";
        window.__CSRF_TOKEN__ = "{{ csrf_token() }}";
    </script>

    <!-- React App (external file — no Jinja2 processing) -->
    <script type="text/babel" src="/static/js/app.jsx?v=7"></script>

</body>

</html>
