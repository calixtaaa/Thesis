<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description"
        content="Hygiene Vending Machine — Smart IoT-powered vending with real-time analytics, ML forecasting, and secure admin dashboard. Built by SyntaxError™.">
    <meta name="theme-color" content="#6366f1">
    <title>Hygiene Vending Machine — SyntaxError™</title>
    <link rel="icon" type="image/jpeg" href="/static/images/ThesisLogo.png">

    <!-- Performance: preconnect to CDNs -->
    <link rel="preconnect" href="https://cdn.tailwindcss.com" crossorigin>
    <link rel="preconnect" href="https://unpkg.com" crossorigin>
    <link rel="dns-prefetch" href="https://cdn.tailwindcss.com">
    <link rel="dns-prefetch" href="https://unpkg.com">

    <!-- Google Font: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', '"SF Pro Display"', '"SF Pro Text"', '"Helvetica Neue"', 'Helvetica', 'Arial', 'sans-serif'],
                    },
                },
            },
        }
    </script>

    <!-- Home Page Styles -->
    <link rel="stylesheet" href="/static/css/home.css?v=1">

    <!-- React 18 -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel (JSX compilation) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body class="font-sans">

    <div id="root"></div>

    <!-- Pass Jinja2 variables to JS -->
    <script>
        window.__LOGIN_URL__ = "{{ url_for('login') }}";
        window.__HOME_URL__ = "{{ url_for('index') }}";
    </script>

    <!-- React Home App -->
    <script type="text/babel" src="/static/js/home.jsx?v=1"></script>

</body>

</html>
