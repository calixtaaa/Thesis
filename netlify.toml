# ══════════════════════════════════════════════════════════════════
#  Netlify Deployment — Hygiene Vending Machine
#  Static site build: renders Flask/Jinja2 templates into HTML
#  during build, then serves everything from CDN.
# ══════════════════════════════════════════════════════════════════

[build]
  command = "bash build_netlify.sh"
  publish = "public"

[build.environment]
  PYTHON_VERSION = "3.11"

# ── Redirects ────────────────────────────────────────────────────

[[redirects]]
  from   = "/favicon.ico"
  to     = "/static/images/vendingMachineIcon.jpg"
  status = 200

# SPA-style: if a page isn't found, show the home page
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Security & Cache Headers ────────────────────────────────────

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control          = "public, max-age=31536000, immutable"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection       = "1; mode=block"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"
