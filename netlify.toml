# ══════════════════════════════════════════════════════════════════
#  Netlify Deployment Configuration
#  Hygiene Vending Machine — Admin Dashboard
# ══════════════════════════════════════════════════════════════════

[build]
  command   = "bash build_netlify.sh"
  publish   = "public"
  functions = "netlify/functions"

[build.environment]
  PYTHON_VERSION = "3.11"

# ── Redirects (processed top-to-bottom, first match wins) ────────

# Serve static assets directly from CDN (fast, immutable cache)
[[redirects]]
  from   = "/static/*"
  to     = "/static/:splat"
  status = 200

# Favicon
[[redirects]]
  from   = "/favicon.ico"
  to     = "/static/images/vendingMachineIcon.jpg"
  status = 200

# Everything else proxied through the Flask serverless function
[[redirects]]
  from   = "/*"
  to     = "/.netlify/functions/app"
  status = 200

# ── Headers ──────────────────────────────────────────────────────

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control       = "public, max-age=31536000, immutable"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection       = "1; mode=block"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"
